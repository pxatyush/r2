name: Build APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 💀 delete gradle cache
    - name: Clean cache
      run: rm -rf ~/.gradle

    # 🔥 download Gradle 7.6 manually (no wrapper)
    - name: Install Gradle 7.6
      run: |
        wget https://services.gradle.org/distributions/gradle-7.6-bin.zip
        unzip gradle-7.6-bin.zip

    # 🚀 build using this gradle (NOT ./gradlew)
    - name: Build APK
      run: ./gradle-7.6/bin/gradle assembleDebug --no-daemon

    # 📦 upload apk
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk